.</span><br><span class="line"></span><br><span class="line">syntax on</span><br><span class="line">filetype indent on      &quot; Turn off indention by filetype.</span><br><span class="line"><span class="string">&quot; Override the previous settings for all file types (some filetype plugins set</span></span><br><span class="line">&quot; these options to different values, which is really annoying).</span><br><span class="line">au FileType * set autoindent nosmartindent nocindent fo+=q fo-=r fo-=o fo+=j</span><br><span class="line">set laststatus=2</span><br><span class="line"></span><br><span class="line"><span class="string">&quot; Whitespace.</span></span><br><span class="line">set tabstop=4           &quot; Number of spaces a tab counts for.</span><br><span class="line">set shiftwidth=4        &quot; Number of spaces to use for each step of indent.</span><br><span class="line">set shiftround          &quot; Round indent to multiple of shiftwidth.</span><br><span class="line">set expandtab           &quot; Expand tab with spaces.</span><br><span class="line"></span><br><span class="line"><span class="string">&quot; Wrapping.</span></span><br><span class="line">set wrap                &quot; Enable text wrapping.</span><br><span class="line">set linebreak           &quot; Break after words only.</span><br><span class="line">set display+=lastline   &quot; Show as much as possible from the last shown line.</span><br><span class="line">set textwidth=0         &quot; Don&#x27;t automatically wrap lines.</span><br><span class="line"><span class="string">&quot; Disable automatic wrapping for all files (some filetype plugins set this to</span></span><br><span class="line">&quot; a different value, which is really annoying).</span><br><span class="line">au FileType * set textwidth=0</span><br><span class="line"></span><br><span class="line"><span class="string">&quot;------------------------------------------------------------------------------</span></span><br><span class="line">&quot; Typos correction.</span><br><span class="line"><span class="string">&quot;------------------------------------------------------------------------------</span></span><br><span class="line"><span class="string"></span></span><br><span class="line">if has(&quot;multi_byte&quot;)</span><br><span class="line">    <span class="string">&quot; UTF-8 编码</span></span><br><span class="line"><span class="string">    set encoding=utf-8</span></span><br><span class="line"><span class="string">    set termencoding=utf-8</span></span><br><span class="line"><span class="string">    set formatoptions+=mM</span></span><br><span class="line"><span class="string">    set fencs=utf-8,gbk</span></span><br><span class="line"><span class="string">    if v:lang =~? &#x27;^/(zh/)/|/(ja/)/|/(ko/)&#x27;</span></span><br><span class="line"><span class="string">        set ambiwidth=double</span></span><br><span class="line"><span class="string">    endif</span></span><br><span class="line">    if has(&quot;win32&quot;)</span><br><span class="line">        source $VIMRUNTIME/delmenu.vim</span><br><span class="line">        source $VIMRUNTIME/menu.vim</span><br><span class="line">        language messages zh_CN.utf-8</span><br><span class="line">    endif</span><br><span class="line">else</span><br><span class="line">    echoerr &quot;Sorry, this version of (g)vim was not compiled with +multi_byte&quot;</span><br><span class="line">endif</span><br><span class="line"></span><br><span class="line"><span class="string">&quot;---------------------------------------------</span></span><br><span class="line">&quot; 插件</span><br><span class="line"><span class="string">&quot;---------------------------------------------</span></span><br><span class="line"><span class="string"></span></span><br><span class="line">&quot; NERDTree</span><br><span class="line"></span><br><span class="line"><span class="string">&quot; 打开vim是自动打开NERDTree</span></span><br><span class="line">&quot; autocmd vimenter * NERDTree</span><br><span class="line"></span><br><span class="line"><span class="string">&quot; 打开编辑器时鼠标默认在编辑区域</span></span><br><span class="line"><span class="string">autocmd vimenter * wincmd p</span></span><br><span class="line"><span class="string"></span></span><br><span class="line">&quot;如果打开vim的时候没有指定文件，则自动打开NERDTree</span><br><span class="line"><span class="string">&quot; autocmd StdinReadPre * let s:std_in=1</span></span><br><span class="line">&quot; autocmd VimEnter * if argc() == 0 &amp;&amp; !exists(&quot;s:std_in&quot;) | NERDTree | endif</span><br><span class="line"></span><br><span class="line"><span class="string">&quot;如果只剩下一个NERDTree窗口，则关闭vim</span></span><br><span class="line">autocmd bufenter * if (winnr(&quot;$&quot;) == 1 &amp;&amp; exists(&quot;b:NERDTree&quot;) &amp;&amp; b:NERDTree.isTabTree()) | q | endif</span><br><span class="line"></span><br><span class="line"><span class="string">&quot; 快捷键设置</span></span><br><span class="line"><span class="string">map &lt;C-b&gt; :NERDTreeToggle&lt;CR&gt;</span></span><br><span class="line"><span class="string"></span></span><br><span class="line">&quot;Powerline configuration</span><br><span class="line"><span class="string">&quot; set guifont=Consolas_for_Powerline_FixedD:h10:cANSI</span></span><br><span class="line">&quot; set guifont=Liberation_Mono_for_Powerline:h10</span><br><span class="line"><span class="string">&quot; set encoding=utf-8</span></span><br><span class="line"><span class="string">set t_Co=256</span></span><br><span class="line"><span class="string">let g:Powerline_symbols = &#x27;fancy&#x27;</span></span><br><span class="line"><span class="string">let Powerline_symbols = &#x27;compatible&#x27;</span></span><br></pre></td></tr></table></figure>
